<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#020617"/><stop offset="1" stop-color="#172554"/></linearGradient>
    <linearGradient id="box" x1="0" x2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,8 L11,4 z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="60" y="70" fill="#f8fafc" font-size="34" font-family="Arial" font-weight="800">Resume Screening &amp; Ranking System</text>
  <text x="60" y="105" fill="#94a3b8" font-size="18" font-family="Arial">NLP architecture for parsing, scoring, ranking, and reporting candidates</text>

  <g filter="url(#shadow)">
    <rect x="60" y="170" width="220" height="110" rx="22" fill="url(#box)" stroke="#334155"/>
    <text x="170" y="210" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="700">Recruiter UI</text>
    <text x="170" y="240" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial">Flask Web Dashboard</text>
    <text x="170" y="263" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial">JD + Resume Uploads</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="150" width="220" height="90" rx="22" fill="url(#box)" stroke="#334155"/>
    <text x="470" y="188" text-anchor="middle" fill="#e2e8f0" font-size="19" font-family="Arial" font-weight="700">Resume Parser</text>
    <text x="470" y="215" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">PDF / TXT / DOCX</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="290" width="220" height="90" rx="22" fill="url(#box)" stroke="#334155"/>
    <text x="470" y="328" text-anchor="middle" fill="#e2e8f0" font-size="19" font-family="Arial" font-weight="700">JD Processor</text>
    <text x="470" y="355" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">Clean + Normalize</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="130" width="220" height="90" rx="22" fill="url(#box)" stroke="#334155"/>
    <text x="770" y="168" text-anchor="middle" fill="#e2e8f0" font-size="19" font-family="Arial" font-weight="700">Skill Extraction</text>
    <text x="770" y="195" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">Matched + Missing Skills</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="260" width="220" height="90" rx="22" fill="url(#box)" stroke="#334155"/>
    <text x="770" y="298" text-anchor="middle" fill="#e2e8f0" font-size="19" font-family="Arial" font-weight="700">TF-IDF Engine</text>
    <text x="770" y="325" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">Cosine Similarity</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="390" width="220" height="90" rx="22" fill="url(#box)" stroke="#334155"/>
    <text x="770" y="428" text-anchor="middle" fill="#e2e8f0" font-size="19" font-family="Arial" font-weight="700">Experience Signal</text>
    <text x="770" y="455" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">Years Pattern Detection</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="960" y="250" width="190" height="120" rx="22" fill="url(#box)" stroke="#334155"/>
    <text x="1055" y="292" text-anchor="middle" fill="#e2e8f0" font-size="19" font-family="Arial" font-weight="700">Hybrid Ranker</text>
    <text x="1055" y="322" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">65% Similarity</text>
    <text x="1055" y="344" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">30% Skills + 5% Exp</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="550" width="500" height="95" rx="22" fill="#082f49" stroke="#38bdf8"/>
    <text x="600" y="590" text-anchor="middle" fill="#f8fafc" font-size="22" font-family="Arial" font-weight="800">Candidate Ranking Report</text>
    <text x="600" y="620" text-anchor="middle" fill="#bae6fd" font-size="15" font-family="Arial">Dashboard table + matched skills + missing skills + CSV export</text>
  </g>

  <line x1="280" y1="215" x2="360" y2="195" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="280" y1="240" x2="360" y2="335" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="580" y1="195" x2="660" y2="175" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="580" y1="335" x2="660" y2="305" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="580" y1="335" x2="660" y2="435" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="880" y1="175" x2="960" y2="285" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="880" y1="305" x2="960" y2="310" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="880" y1="435" x2="960" y2="340" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1055" y1="370" x2="740" y2="550" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
