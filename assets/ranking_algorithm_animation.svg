<svg width="1000" height="360" viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated resume ranking algorithm flow">
  <defs>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
    </marker>
  </defs>

  <rect width="1000" height="360" rx="26" fill="#020617"/>
  <text x="40" y="52" fill="#f8fafc" font-size="28" font-family="Arial" font-weight="700">Animated Algorithm: Resume Screening & Ranking</text>
  <text x="40" y="82" fill="#94a3b8" font-size="15" font-family="Arial">The blue pulse shows how a resume moves through the NLP ranking pipeline.</text>

  <g filter="url(#shadow)">
    <rect x="40" y="130" width="140" height="90" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="110" y="165" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Arial" font-weight="700">1. Parse</text>
    <text x="110" y="192" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial">PDF / TXT / DOCX</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="235" y="130" width="140" height="90" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="305" y="165" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Arial" font-weight="700">2. Clean</text>
    <text x="305" y="192" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial">Normalize text</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="130" width="140" height="90" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="500" y="165" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Arial" font-weight="700">3. Match</text>
    <text x="500" y="192" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial">Skills + TF-IDF</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="625" y="130" width="140" height="90" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="695" y="165" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Arial" font-weight="700">4. Score</text>
    <text x="695" y="192" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial">Hybrid ranking</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="130" width="140" height="90" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="890" y="165" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Arial" font-weight="700">5. Shortlist</text>
    <text x="890" y="192" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial">CSV + dashboard</text>
  </g>

  <line x1="180" y1="175" x2="235" y2="175" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="375" y1="175" x2="430" y2="175" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="175" x2="625" y2="175" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="765" y1="175" x2="820" y2="175" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>

  <circle r="10" fill="#22c55e">
    <animateMotion dur="5s" repeatCount="indefinite" path="M110 250 L305 250 L500 250 L695 250 L890 250"/>
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/>
  </circle>

  <path d="M110 250 L305 250 L500 250 L695 250 L890 250" fill="none" stroke="#334155" stroke-width="3" stroke-dasharray="7 8"/>
  <text x="500" y="305" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">Resume text becomes structured evidence → similarity score → ranked shortlist</text>
</svg>
